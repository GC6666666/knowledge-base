# Knowledge Base Configuration

database:
  host: "localhost"
  port: 5433
  user: "kbuser"
  password: "kbpass"
  name: "knowledgebase"
  max_conns: 10
  min_conns: 2

ai:
  provider: "codex"  # minimax, openai, ollama, codex
  codex:
    api_key: "${CODEX_API_KEY}"
    base_url: "http://127.0.0.1:15721/v1"
    model: "gpt-5.4"
    reasoning_effort: "high"
    embedding_model: "text-embedding-3-small"
    embedding_dim: 1536
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3"
    embedding_model: "nomic-embed-text"

app:
  host: "0.0.0.0"
  port: 8088
  data_dir: "./kb-data"
  log_level: "info"

ingest:
  chunk_size: 512
  chunk_overlap: 64
  max_file_size: 100MB
  supported_types:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".webp"
    - ".bmp"
    - ".txt"
    - ".md"
    - ".markdown"
    - ".pdf"
    - ".doc"
    - ".docx"

watch:
  enabled: false
  paths: []
  debounce: 5s

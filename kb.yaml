# Knowledge Base Configuration

database:
  host: "localhost"
  port: 5433
  user: "kbuser"
  password: "kbpass"
  name: "knowledgebase"
  max_conns: 10
  min_conns: 2

ai:
  provider: "qwen"  # qwen, minimax, codex, openai, ollama
  tasks:
    summarize: "qwen"
    classify: "qwen"
    embed: "qwen"
  qwen:
    api_key: "${DASHSCOPE_API_KEY}"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-plus"
    embedding_model: "text-embedding-v4"
    embedding_dim: 1536
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    base_url: "https://api.minimax.chat/v1"
    group_id: "2029883242278035714"
    model: "MiniMax-M2.7"
    embedding_model: "embo-01"
    embedding_dim: 1536
    max_tokens: 4096
    temperature: 1.0
    reasoning_split: false  # Enable interleaved thinking chain
  codex:
    api_key: "${CODEX_API_KEY}"
    base_url: "https://api.codex-for.me/v1"
    model: "gpt-5.4"
    reasoning_effort: "high"
    embedding_model: "text-embedding-3-small"
    embedding_dim: 1536
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
  ollama:
    base_url: "http://localhost:11434"
    model: "llama3"
    embedding_model: "nomic-embed-text"

app:
  host: "0.0.0.0"
  port: 8088
  data_dir: "./kb-data"
  log_level: "info"

ingest:
  chunk_size: 512
  chunk_overlap: 64
  max_file_size: 100MB
  supported_types:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".webp"
    - ".bmp"
    - ".txt"
    - ".md"
    - ".markdown"
    - ".pdf"
    - ".doc"
    - ".docx"

watch:
  enabled: false
  paths: []
  debounce: 5s
